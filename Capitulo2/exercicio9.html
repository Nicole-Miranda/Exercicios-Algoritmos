<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>BANCO</h1>
    <label>Qual seu saldo atual do seu banco?</label>
    <input type="text" id="id_valor">
    <br><br>
    <button onclick="verificar()">Verificar finanças</button>
    <br><br>
    <div id="resultado"></div>
</body>
<script>
    function verificar() {
        let valor = Number(id_valor.value)

        if (valor == 0) {
            resultado.innerHTML += ``
            resultado.innerHTML += `<span style="color:black;"> Conta zerada`
        } else if (valor < 0) {
            resultado.innerHTML += ``
            resultado.innerHTML += `<span style="color:red;"> Está devendo!`
        } else {
            resultado.innerHTML += ``
            resultado.innerHTML += `<span style="color:blue;"> Saldo positivo! :`
        }
    }
</script>

</html>
