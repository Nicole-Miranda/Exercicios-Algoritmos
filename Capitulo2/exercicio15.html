<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=h1, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>TEMPERATURAA</h1>
    <label>Insira sua temperatura</label>
    <input type="text" id="id_temp">
    <br><br>
    <button onclick="verificar()">Verificar temperatura</button>
</body>
<script>
    function verificar(){
        let temperatura = Number(id_temp.value)

        if(temperatura < 14){
            alert('CONGELANTE')
        }else if(temperatura <= 21){
             alert('C0M FRIO')
        }else if(temperatura <= 24){
             alert('CONFORTÁVEL')
        }else if(temperatura <= 31){
             alert('COM CALOR')
        }else{
             alert('ESCALDANTE')
        }
    }
</script>
</html>
