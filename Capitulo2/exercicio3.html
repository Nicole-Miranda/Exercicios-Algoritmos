<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>VERIFIQUE SUA NOTA</h1>
    <label>Nota 1:</label>
    <input type="text" id="id_nota1">
    <br><br>
    <label>Nota 2:</label>
    <input type="text" id="id_nota2">
    <br><br>
    <label>Nota 3:</label>
    <input type="text" id="id_nota3">
    <br><br>
    <button onclick="desempenho()">Analisar desempenho</button>
    <div id="calcular"></div>
</body>
<script>
    function desempenho(){
        let nota1 = Number(id_nota1.value)
        let nota2 = Number(id_nota2.value)
        let nota3 = Number(id_nota3.value)
        let media = (nota1 + nota2 + nota3)/3

        calcular.innerHTML += `Sua média foi de ${media.toFixed(2)}<br>`

        if(media > 9.4){
            calcular.innerHTML +=`Parabéns, você é fora de série!`
        }
    }
</script>
</html>
