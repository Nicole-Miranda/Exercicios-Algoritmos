<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>QUAL SUA ALTURA?</h1>
    <label>Insira sua altura</label>
    <input type="text" id="id_altura">
    <br><br>
    <button onclick="analisar()">Analisar Estatura</button>
    <div id="resultado"></div>
</body>
<script>
    function analisar(){
        let altura = Number(id_altura.value)

        if(altura <= 1.65){
            resultado.innerHTML = `Você pode ser piloto de corrida`
        }else if(altura <= 1.80){
             resultado.innerHTML = `Você pode ser jogador de futebol`
        }else{
             resultado.innerHTML = `Você pode ser jogador de vôlei ou basquete`
        }
    }
</script>
</html>
