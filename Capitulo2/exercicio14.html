<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>TUVALU!!!</h1>
    <label>Insira sua renda familiar mensal</label>
    <input type="text" id="id_renda">
    <br><br>
    <button onclick="analisar()">Analisar renda</button>
    <div id="resultado"></div>
</body>
<script>
    function analisar(){
        let renda = Number(id_renda.value)

        if(renda <= 250){
            resultado.innerHTML = `CLASSE E`
        }else if(renda <= 900){
            resultado.innerHTML = `CLASSE D`
        }else if(renda <= 2500){
            resultado.innerHTML = `CLASSE C`
        }else if(renda <= 9500){
            resultado.innerHTML = `CLASSE B`
        }else{
            resultado.innerHTML = `CLASSE A`
        }
    }
</script>
</html>
