<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>PIZZA</h1>
    <label>Qual o valor da pizza?</label>
    <input type="text" id="id_valor">
    <br><br>
    <label>Quantidade de amigos reunidos?</label>
    <input type="text" id="id_amigos">
    <br><br>
    <button onclick="calcular()">Rola pizza?</button>
    <div id="resultado"></div>
</body>
<script>
    function calcular(){

        let valor = Number(id_valor.value)
        let amigo = Number(id_amigos.value)
        let valorTotal = valor/amigo

        resultado.innerHTML += ``
        resultado.innerHTML += `Cada amigo vai pagar ${valorTotal.toFixed(2)} pela pizza<br>`
        
        if(valorTotal > 20){
            resultado.innerHTML += ``
            resultado.innerHTML += `Deu ruim! Pizza muito cara!`
        }
    }
</script>
</html>
