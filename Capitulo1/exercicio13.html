<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>TRANSFERÊNCIA BANCÁRIA</h1>
    <button onclick="receber100()">Receber 100</button>
    <br><br>
    <button onclick="pagar50()">Pagar 50</button>
    <div id="resultado"></div>
</body>
<script>
    let saldo = 0
    function receber100(){
        saldo += 100
        resultado.innerHTML = `Transferência de R$100 recebida! Saldo atual:${saldo}`
    }

    function pagar50(){
        saldo -= 50
        resultado.innerHTML=`Pagamento de R$50 efetuado! Saldo atual:${saldo}`
    }
</script>
</html>
