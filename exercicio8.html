<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>PROGRAMA</h1>
    <label>Quantos voltas o carro dá em uma corrida</label>
    <input type="text" id="id_voltas">
    <br><br>
    <button onclick="verificar()">Iniciar Corrida</button>
    <div id="resultado"></div>
</body>
<script>
    function verificar(){
        let voltas = Number(id_voltas.value)

        for (let i = 1; i <= voltas; i++) {
            resultado.innerHTML += `Carro dando a ${i}° volta<br>`
            
        }
        resultado.innerHTML += `Corrida finalizada!`
    }
</script>
</html>
