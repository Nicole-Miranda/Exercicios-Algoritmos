<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>TEMPERATURA</h1>
    <label>Qual a temperatura atual?</label>
    <input type="text" id="id_temp">
    <br><br>
    <button onclick="analisar()">Analisar Clima</button>
</body>
<script>
    function analisar(){
        let temperatura = Number(id_temp.value)

        if(temperatura >=21 && temperatura <= 24){
            if(temperatura < 21){
                alert('As pessoas vão ter hipotermia')
            }else if(temperatura > 24){
                alert('As pessoas vão derreter!')
            }
        }else{
            alert('Alerta Desconforto!')
        }
    }
</script>
</html>
