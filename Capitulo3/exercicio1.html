<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>TEMPERATURA</h1>
    <label>Qual a temperatura atual?</label>
    <input type="text" id="id_temp">
    <br><br>
    <button onclick="avaliar()">Ver situação</button>
</body>
<script>
    function avaliar(){
    let temperatura = Number(id_temp.value) 

    if(temperatura >= 21 || temperatura >=24){
        alert('Temperatura confortável :D')
    }else{
        alert('Temperatura DESCONFORTÁVEL')
    }
    }
</script>
</html>
