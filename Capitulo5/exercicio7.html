<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>NOME ALUNO</h1>
    <label>Insira os nome para serem cadastrados</label>
    <input type="text" id="id_nome">
    <br><br>
    <button onclick="cadastrar()">Cadastrar</button>
    <div id="resultado"></div>
</body>
<script>
    let alunos = []
    function cadastrar(){
        let nome = id_nome.value
        alunos.push(nome)
        
        atualizarUsuario()
    }

    function atualizarUsuario(){

         resultado.innerHTML = ""
        for (let i = alunos.length - 1; i >= 0; i--) {
          
            resultado.innerHTML += `${alunos[i]} <br>`
            
        }
    }
</script>
</html>
