<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>PROGRAMA</h1>
    <label>Insira um intervalo númerico</label>
    <input type="text" id="id_numero">
    <br><br>
    <button onclick="verificar()">S2 Pares</button>
     <div id="resultado"></div>
</body>
<script>
    function verificar(){
        let numero = Number(id_numero.value)

        for (let i = 0; i <= numero; i++) {
            if( i % 2 == 0){
                resultado.innerHTML += `${i}<br>`
            }
            
        }
    }
</script>
</html>
