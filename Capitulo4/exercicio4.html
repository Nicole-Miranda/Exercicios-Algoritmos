<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>NÚMEROS!</h1>
    <br><br>
    <label>Insira um número de 20 a 100</label>
    <input type="text" id="id_numero">
    <br><br>
    <button onclick="verificar()">Adoro multiplos de 5</button>
    <div id="resultado"></div>
</body>
<script>
    function verificar(){
        let numero = Number(id_numero.value)

        for (let i = 0; i <= numero ; i++) {
           if(i % 5 == 0){
            resultado.innerHTML += `${i}<br>`
           }
            
        }
    }
</script>
</html>
