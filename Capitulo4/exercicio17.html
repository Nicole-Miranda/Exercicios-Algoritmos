<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>FrizzBuzz</h1>
    <br><br>
    <button onclick="verificar()">FrizzBuzz</button>
    <div id="resultado"></div>
</body>
<script>
    function verificar(){

for (let i = 1; i <= 100; i++) {

    if(i % 3 == 0 && i % 5 == 0){
        resultado.innerHTML += `${i} FizzBuzz<br>`
    }else if(i % 3 == 0){
        resultado.innerHTML += `${i} Fizz<br>`
    }else if(i % 5 == 0){
        resultado.innerHTML += `${i} Buzz<br>`
    }else {
        resultado.innerHTML += `${i}<br>`
    }
    
}
    }
</script>
</html>
