<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>FÃ</h1>
    <label>Qual o nome da pessoa que você mais ama?</label>
    <input type="text" id="id_pessoa">
    <br><br>
    <label>O quanto você ama essa pessoa?(número inteiro)</label>
    <input type="text" id="id_numero">
    <br><br>
    <button onclick="verificar()">Expressar amor</button>
    <div id="resultado"></div>
</body>
<script>
    function verificar(){
        let pessoa = id_pessoa.value
        let numero = Number(id_numero.value)

        for (let i = 0; i <= numero; i++) {
            resultado.innerHTML += `${pessoa}, eu te amo! Sempre lembre disso!<br>`
        }
    }
</script>
</html>
