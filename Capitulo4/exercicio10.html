<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <h1>Carro</h1> 
   <label>Quantas pessoas vão entrar no carro?</label>
   <input type="text" id="id_pessoas">
   <br><br>
   <label>Quantidade de passageiros suportados</label>
   <input type="text" id="id_passageirosMax">
   <br><br>
   <button onclick="verificar()">#PartiuCarona</button>
   <div id="resultado"></div>
</body>
<script>
    function verificar(){
        let pessoas = Number(id_pessoas.value)
        let capacidadeTotal = Number(id_passageirosMax.value)

        for (let i = 1; i <= pessoas; i++) {

            if(i == 1){
                resultado.innerHTML += `Entrou o ${i}° passageiro (que é o motorista)<br>`

            }
            else if(i < 6){
               resultado.innerHTML += `Entrou o ${i}° passageiro<br>`
                
            }else if( i > capacidadeTotal){
                resultado.innerHTML += `O passageiro ${i}° terá que esperar!<br>`
            }
            
        }
    }
</script>
</html>
