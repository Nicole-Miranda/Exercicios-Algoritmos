<body>
    <h1>NÚMERO</h1>
    <label>Insira um intervalo númerico</label>
    <input type="text" id="id_numero">
    <br><br>
    <button onclick="verificar()">Curto 3 e 5</button>
    <div id="resultado"></div>
</body>
<script>

        let numero = Number(id_numero.value)

        resultado.innerHTML = ""
        for (let i = 1; i <= numero; i++) {
            
            if (i % 3 == 0 && i % 5 == 0) {
                resultado.innerHTML += `${i} (É TRI! É PENTA)<br>`
            }else if (i % 3 == 0) {
                resultado.innerHTML += `${i} (É TRI!)<br>`
            } else if (i % 5 == 0) {
                resultado.innerHTML += `${i} (É PENTA!)<br>`
            } else {

            }
            resultado.innerHTML += `${i}<br>`
            

        }
    }
</script>
